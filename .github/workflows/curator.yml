name: curator
# Mori (Kura Curator) keeps june.build's docs true to the code. On a PR that touches a package a
# doc tracks via `sources:`, Mori updates the page and commits it onto the same PR branch.
# Same-repo mode: docs (apps/june.build/content/docs) live beside the code — the built-in
# GITHUB_TOKEN is enough, no extra credential.
on:
  pull_request:
    paths:
      - "packages/**"
permissions:
  contents: write          # commit the docs update onto the PR branch
  pull-requests: write     # for the push/manual standalone-PR path
jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}   # the PR branch, so Mori can push the docs onto it
          fetch-depth: 0                # full history, to diff against the base
      - uses: kurajs/curator@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          docs-dir: apps/june.build/content/docs
