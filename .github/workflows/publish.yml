name: Publish

# npm trusted publishing (OIDC): no tokens, no OTP — pushing a v* tag is the
# release. npm (≥11.5, ships with Node 24) does the OIDC exchange; bun packs
# the tarballs because `bun pm pack` rewrites workspace:* deps to the real
# versions (npm publish would ship them verbatim — the 0.0.2 incident).

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # required for OIDC
  contents: read

# Serialize releases. Two v* tags pushed together (e.g. catching npm up across
# versions) would otherwise run two Publish jobs at once, both PUTting the SAME
# packages' npm packuments — npm rejects the loser with E409 "Failed to save
# packument" and that release aborts mid-way (a partial publish). One run at a
# time; never cancel an in-flight release (a half-published version is worse than
# a queued one). Still prefer pushing release tags one at a time — this is the
# safety net, not a license to fire them simultaneously.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never use caching in release builds

      - name: Install
        run: bun install --frozen-lockfile

      - name: Tag matches package versions
        run: |
          v=$(python3 -c "import json; print(json.load(open('packages/core/package.json'))['version'])")
          [ "v$v" = "$GITHUB_REF_NAME" ] || { echo "tag $GITHUB_REF_NAME != package version $v"; exit 1; }

      - name: Typecheck + test
        run: bun run ci

      - name: Pack and publish
        run: |
          set -euo pipefail
          # Idempotent: a partially-failed release (one package's trusted
          # publisher misconfigured) is fixed on npmjs and re-run — already
          # published versions are skipped, not errors.
          for p in core db june juno cli create-june; do
            name=$(python3 -c "import json; print(json.load(open('packages/$p/package.json'))['name'])")
            v=$(python3 -c "import json; print(json.load(open('packages/$p/package.json'))['version'])")
            if [ "$(npm view "$name@$v" version 2>/dev/null)" = "$v" ]; then
              echo "$name@$v already on the registry — skipping"
              continue
            fi
            (cd "packages/$p" && bun pm pack && npm publish ./*.tgz --access public)
          done
