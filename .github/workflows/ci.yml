name: CI

# Green from commit #1. The PoC let typecheck drift because nothing enforced it
# (docs/rebuild-plan.md Phase 0) — this job is the enforcement. The `june build`
# of the site (Phase 3) and the dev/built parity check join here as they land.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
